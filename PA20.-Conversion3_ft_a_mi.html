    <div id="agua_1"><br><br>  <em>Introduce una cantidad en PIES:</em>
        <input type="text" name="pp" id="pp">
        <br><br>
        <input type="button" name="convertir" id="Convertir" value="Convertir" onclick="Convertir()">
        <br><br>
        <em>Tu cantidad en millas es: </em> 
        <input type="text" name="coor" id="coor"></div>

            function Convertir()
            {
                var z3 = document.getElementById('pp').value;
                var respuesta = z3 /5280;
                document.getElementById('coor').value = respuesta;
            }
        </script>
