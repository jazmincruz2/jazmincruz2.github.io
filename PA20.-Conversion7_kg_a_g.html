<head>

<body>
    <a href="PA20.-pagina_de_menu.html"><input type="button" name="ver" id="ver" value="REGRESAR"> </a>
        <div id="nuve_1"><br><br>  <em>Introduce tu cantidad en kilogramos:</em>
        <input type="text" name="ppp" id="ppp">
        <br><br>
        <input type="button" name="convertir" id="Convertir" value="Convertir" onclick="Convertir()">
        <br><br>
        <em>Tu cantidad en gramos es: </em> 
        <input type="text" name="roou" id="roou"></div> 
        <script>
            function Convertir()
            {
                var v1 = document.getElementById('ppp').value;
                var respuesta = v1 * 1000;
                document.getElementById('roou').value = respuesta;
            }
        </script>
</body>
